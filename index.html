<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link type="text/css" rel="stylesheet" href="style.css"> <!-- Link to external stylesheet -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>
<body>
  <div class="container">
    <div class="result-card">
      <h1>Your Result</h1>
        <div class="result-score">
          <h2>76</h2>
          <p>of 100</p>
        </div>
      <h3>Great</h3>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>

    <div class="summary-card">

      <h2>Summary</h2>
        
        <div class="row-container">
          
          <div class="row">
            <div class="img-container">
              <img src="./assets/images/icon-reaction.svg" alt="reaction icon"> 
              <h3>Reaction</h3>
            </div> 
            <p><span>80</span> / 100</p>
          </div>
        
          <div class="row">
            <div class="img-container">
              <img src="./assets/images/icon-memory.svg" alt="memory icon">
              <h3>Memory</h3>
            </div> 
            <p><span>92</span> / 100</p>
          </div>
        
        <div class="row">
          <div class="img-container">
            <img src="./assets/images/icon-verbal.svg" alt="verbal icon">
            <h3>Verbal</h3>
          </div>
          <p><span>61</span> / 100</p>
        </div>
        
        <div class="row">
          <div class="img-container">
            <img src="./assets/images/icon-visual.svg" alt="visual icon">
            <h3>Visual</h3>
          </div>
          <p><span>73</span> / 100</p>
        </div>
        <button class="continue-btn">Continue</button>   
  </div>
</div> 

</body>
</html>
